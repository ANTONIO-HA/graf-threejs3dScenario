<!DOCTYPE html>
<html lang="es">
    <head>
        <title>three.js webgl - FBX loader - Turning con Entorno y Audio</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
        <link type="text/css" rel="stylesheet" href="main.css">
        <style>
            /* Estilos para el reproductor de audio */
            #audio-player {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background-color: rgba(0, 0, 0, 0.7);
                color: #fff;
                padding: 10px 20px;
                border-radius: 10px;
                font-family: sans-serif;
                text-align: center;
                z-index: 100;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            #track-name {
                font-size: 14px;
                font-weight: bold;
            }
            .audio-controls button {
                background: #444;
                color: white;
                border: none;
                padding: 5px 10px;
                margin: 0 2px;
                border-radius: 5px;
                cursor: pointer;
            }
            .audio-controls button:hover {
                background: #666;
            }
        </style>
    </head>

    <body>
        <div id="info">
            <a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - FBXLoader - Turning<br />
            Character and animation from <a href="https://www.mixamo.com/" target="_blank" rel="noopener">Mixamo</a>
        </div>

        <div id="audio-player">
            <div id="track-name">Cargando música...</div>
            <div class="audio-controls">
                <button id="btn-prev">Anterior</button>
                <button id="btn-play">Play</button>
                <button id="btn-pause">Pausa</button>
                <button id="btn-next">Siguiente</button>
            </div>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "../build/three.module.js",
                    "three/addons/": "./jsm/"
                }
            }
        </script>

        <script type="module">

            import * as THREE from 'three';
            import Stats from 'three/addons/libs/stats.module.js';
            import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
            import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
            import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
            import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

            const manager = new THREE.LoadingManager();

            let camera, scene, renderer, stats, object, loader, guiMorphsFolder;
            let mixer;
            let sound, bgSound1, bgSound2, audioLoader;

            const clock = new THREE.Clock();

            const params = {
                asset: 'Turning'
            };

            const assets = [
                'Zombie Stumbling',
                'Turning',
                'Swimming',
                'Northern Soul Spin',
                'Boxing',
            ];

            // --- CONFIGURACIÓN DE PLAYLIST DE AUDIO ---
            const playlist = [
                'audio3.mp3',
                'audio4.mp3',
                'audio5.mp3',
                'audio6.mp3',
                'audio7.mp3'
            ];
            let currentTrackIndex = 0;

            // Carga de textura original del FBX
            const textureLoader = new THREE.TextureLoader(manager);
            const metalTexture = textureLoader.load('models/textures/estrellas.jpg');
            metalTexture.colorSpace = THREE.SRGBColorSpace; 

            init();

            function init() {

                const container = document.createElement( 'div' );
                document.body.appendChild( container );

                camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 2000 );
                camera.position.set( 100, 200, 300 );

                scene = new THREE.Scene();
                
                // --- 1. AGREGAR ENTORNO HDR ---
                // Aquí agrego mi ambiente HDR para iluminar la escena
                const rgbeLoader = new RGBELoader(manager);
                rgbeLoader.load('models/rgbe/burnt_warehouse_8k.hdr', function (texture) {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    scene.background = texture;
                    scene.environment = texture; // Provee iluminación global a los materiales
                });

                // --- 2. AGREGAR TEXTURA AL SUELO ---
                // Aquí agrego mi textura al piso de la escena
                const floorTexture = textureLoader.load('models/textures/suelo.jpg');
                floorTexture.colorSpace = THREE.SRGBColorSpace;
                floorTexture.wrapS = THREE.RepeatWrapping;
                floorTexture.wrapT = THREE.RepeatWrapping;
                floorTexture.repeat.set(10, 10); // Repetir la textura para que no se vea estirada

                // Aplicar la textura al plano del suelo
                const mesh = new THREE.Mesh( 
                    new THREE.PlaneGeometry( 2000, 2000 ), 
                    new THREE.MeshStandardMaterial( { map: floorTexture, depthWrite: false, roughness: 0.8 } ) 
                );
                mesh.rotation.x = - Math.PI / 2;
                mesh.receiveShadow = true;
                scene.add( mesh );

                const grid = new THREE.GridHelper( 2000, 20, 0x000000, 0x000000 );
                grid.material.opacity = 0.2;
                grid.material.transparent = true;
                scene.add( grid );
                
                // Luces secundarias (El HDR ya da luz, pero estas acentúan las sombras)
                const dirLight = new THREE.DirectionalLight( 0xffffff, 2 );
                dirLight.position.set( 0, 200, 100 );
                dirLight.castShadow = true;
                dirLight.shadow.camera.top = 180;
                dirLight.shadow.camera.bottom = - 100;
                dirLight.shadow.camera.left = - 120;
                dirLight.shadow.camera.right = 120;
                scene.add( dirLight );

                const topLight = new THREE.DirectionalLight( 0xffffff, 5 );
                topLight.position.set( 0, 1000, 0 );
                scene.add( topLight );

                loader = new FBXLoader( manager );
                loadAsset( params.asset );

                renderer = new THREE.WebGLRenderer( { antialias: true } );
                renderer.setPixelRatio( window.devicePixelRatio );
                renderer.setSize( window.innerWidth, window.innerHeight );
                renderer.setAnimationLoop( animate );
                renderer.shadowMap.enabled = true;
                renderer.toneMapping = THREE.ACESFilmicToneMapping; // Mejora cómo se ve el HDR
                container.appendChild( renderer.domElement );

                const controls = new OrbitControls( camera, renderer.domElement );
                controls.target.set( 0, 100, 0 );
                controls.update();

                window.addEventListener( 'resize', onWindowResize );

                stats = new Stats();
                container.appendChild( stats.dom );

                const gui = new GUI();
                gui.add( params, 'asset', assets ).onChange( function ( value ) {
                    loadAsset( value );
                } );
                guiMorphsFolder = gui.addFolder( 'Morphs' ).hide();

                // --- 3. CONFIGURACIÓN DE AUDIO ---
                initAudio();
            }

            function initAudio() {
                // Aquí hago uso de mis audios y los configuro
                const listener = new THREE.AudioListener();
                camera.add(listener);

                sound = new THREE.Audio(listener);
                bgSound1 = new THREE.Audio(listener);
                bgSound2 = new THREE.Audio(listener);
                audioLoader = new THREE.AudioLoader(manager);

                // Cargar audios de fondo en bucle al 0.5 de volumen
                audioLoader.load('models/rgbe/audio/audio1.mp3', function (buffer) {
                    bgSound1.setBuffer(buffer);
                    bgSound1.setLoop(true);
                    bgSound1.setVolume(0.5);
                    bgSound1.play();
                });

                audioLoader.load('models/rgbe/audio/audio2.mp3', function (buffer) {
                    bgSound2.setBuffer(buffer);
                    bgSound2.setLoop(true);
                    bgSound2.setVolume(0.5);
                    bgSound2.play();
                });

                // Asignar eventos a los botones HTML
                document.getElementById('btn-play').addEventListener('click', () => {
                    if (!sound.isPlaying && sound.buffer) sound.play();
                });
                
                document.getElementById('btn-pause').addEventListener('click', () => {
                    if (sound.isPlaying) sound.pause();
                });

                document.getElementById('btn-next').addEventListener('click', () => {
                    currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
                    loadTrack(currentTrackIndex);
                });

                document.getElementById('btn-prev').addEventListener('click', () => {
                    currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
                    loadTrack(currentTrackIndex);
                });

                // Cargar primera pista
                loadTrack(currentTrackIndex);
            }

            function loadTrack(index) {
                if (sound.isPlaying) sound.stop();
                
                const trackName = playlist[index];
                document.getElementById('track-name').innerText = "Reproduciendo: " + trackName;

                audioLoader.load('models/rgbe/audio/' + trackName, function (buffer) {
                    sound.setBuffer(buffer);
                    sound.setLoop(true);
                    sound.setVolume(0.6); // Volumen ajustado a 0.3 para los demás audios
                    // Intenta reproducir automáticamente (los navegadores pueden bloquear esto si el usuario no ha interactuado con la página)
                    sound.play(); 
                }, undefined, function (err) {
                    document.getElementById('track-name').innerText = "Error cargando pista";
                    console.error('Error al cargar audio:', err);
                });
            }

            function loadAsset( asset ) {
                // Aquí es donde pongo y cargo mi modelo FBX
                loader.load( 'models/fbx/' + asset + '.fbx', function ( group ) {
                    if ( object ) {
                        object.traverse( function ( child ) {
                            if ( child.isSkinnedMesh ) child.skeleton.dispose();
                            if ( child.material ) {
                                const materials = Array.isArray( child.material ) ? child.material : [ child.material ];
                                materials.forEach( material => {
                                    if ( material.map ) material.map.dispose();
                                    material.dispose();
                                } );
                            }
                            if ( child.geometry ) child.geometry.dispose();
                        } );
                        scene.remove( object );
                    }

                    object = group;

                    if ( object.animations && object.animations.length ) {
                        mixer = new THREE.AnimationMixer( object );
                        const action = mixer.clipAction( object.animations[ 0 ] );
                        action.play();
                    } else {
                        mixer = null;
                    }

                    guiMorphsFolder.children.forEach( ( child ) => child.destroy() );
                    guiMorphsFolder.hide();

                    // Mantenemos la textura original solicitada (estrellas.jpg)
                    // Aquí le pongo mi textura al FBX
                    const dynamicMaterial = new THREE.MeshPhongMaterial({
                        map: metalTexture,
                        color: 0xffffff, 
                        shininess: 60,  
                        specular: 0x999999 
                    });

                    object.traverse( function ( child ) {
                        if ( child.isMesh ) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            child.material = dynamicMaterial;

                            if ( child.morphTargetDictionary ) {
                                guiMorphsFolder.show();
                                const meshFolder = guiMorphsFolder.addFolder( child.name || child.uuid );
                                Object.keys( child.morphTargetDictionary ).forEach( ( key ) => {
                                    meshFolder.add( child.morphTargetInfluences, child.morphTargetDictionary[ key ], 0, 1, 0.01 );
                                } );
                            }
                        }
                    } );

                    scene.add( object );
                } );
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize( window.innerWidth, window.innerHeight );
            }

            function animate() {
                const delta = clock.getDelta();
                if ( mixer ) mixer.update( delta );
                renderer.render( scene, camera );
                stats.update();
            }

        </script>
    </body>
</html>
